<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icon/pokeball.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <title>Pokédex</title>
</head>
<body onload="init()">
    <header>
        <div class="header_inner">
            <img src="./assets/icon/pokeball.png" alt="">
            <h1>Pokedex</h1>
            <div class="search-bar">
                <input class="search-input" id="search-input" data-id="search-input" type="text" placeholder="Search Pokémon">
                <button class="btn-search" data-id="search-button" onclick="searchPokemon()">Search</button>
                <button class="btn-reset" onclick="resetSearch()">Reset</button>
            </div>
        </div> 
    </header>
    <main id="content" data-id="content">
        <div id="card" class="card" ></div>
        <button id="load-more-button" data-id="load-more-button" onclick="loadPokemon()">Load more</button>
        <div id="loader">
            <div class="loader-spinner"></div>
            <p>Loading...</p>
        </div>
    </main>
    <dialog id="dialog" data-id="dialog" onclick="handleDialogClick(event)">
        <div id="overlay-pokemon-name" data-id="overlay-pokemon-name">
            <div id="dialog-header" class="dialog-header">
                <button id="close-dialog-button" data-id="close-dialog-button" onclick="closeDialog()">&times;</button>
                <img class="dialog-pokeball" src="./assets/icon/pokeball.png" alt="">
                <span id="dialog-id"></span>
                <h2 id="dialog-name"></h2>
                <div id="dialog-types"></div>
                <img id="dialog-image" data-id="dialog-image" src="" alt="">
            </div>
            <div class="dialog-body">
                <div id="dialog-stats"></div>
                <div class="dialog-navigation">
                    <button id="prev-button" data-id="prev-button" onclick="openDialog(currentIndex - 1)">←</button>
                    <button id="next-button" data-id="next-button" onclick="openDialog(currentIndex + 1)">→</button>
                </div>
            </div>
        </div>
    </dialog>
    
    <script type="text/javascript" src="templates.js"></script>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
