<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icon/pokeball.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <title>Pokédex</title>
</head>
<body onload="init()">
    <header>
        <div class="header_inner">
            <img src="./assets/icon/pokeball.png" alt="">
            <h1>Pokedex</h1>
            <div>
                <input class="search-input" id="search-input" type="text" placeholder="search">
                <button onclick="searchPokemon()">Search</button>
            </div>
        </div> 
    </header>
    <main id="content">
        <div id="card" class="card" ></div>
        <div id="loader"></div>
        <button id="load-more-button" onclick="loadPokemon()">Load more</button>
    </main>
    <dialog id="dialog" data-id="dialog" onclick="handleDialogClick(event)">
        <div id="overlay-pokemon-name" data-id="overlay-pokemon-name">
            <button id="close-dialog-button" data-id="close-dialog-button" onclick="closeDialog()">X</button>
            <img id="dialog-image" data-id="dialog-image" src="" alt="">
            <h2 id="dialog-name"></h2>
            <div id="dialog-types"></div>
            <div id="dialog-stats"></div>
            <div class="dialog-navigation">
                <button id="prev-button" data-id="prev-button" onclick="openDialog(currentIndex - 1)">←</button>
                <button id="next-button" data-id="next-button" onclick="openDialog(currentIndex + 1)">→</button>
            </div>
        </div>
    </dialog>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
