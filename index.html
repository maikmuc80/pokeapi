<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icon/pokeball.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <title>Pokédex</title>
</head>
<body onload="init()">
    <header>
        <div class="header_inner">
            <img src="./assets/icon/pokeball.png" alt="">
            <h1>Pokedex</h1>
            <div>
                <input class="search-input" id="search-input" type="text" placeholder="search">
            </div>
        </div> 
    </header>
    <main id="content">
        <div id="card" class="card" ></div>
        <div id="loader"></div>
        <button id="load-more-button" onclick="loadPokemon()">Load more</button>
    </main>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
